<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Your Attention Bank Portal</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="portal-body">
  <nav class="nav">
    <div class="brand">Attention Bank</div>
    <ul class="nav-links">
      <li><a href="./index.html">Home</a></li>
      <li><a href="./profile.html">Profile</a></li>
      <li><a href="./settings.html">Settings</a></li>
    </ul>
    <a class="cta create-account" href="#">Create Account</a>
  </nav>

  <section class="portal-hero">
    <h1 class="portal-title">ATTENTION BANK PORTAL</h1>
    <p class="portal-sub">Direct your priorities, unlock your potential.</p>
  </section>

  <section class="portal-wrap">
    <div class="portal-bg"></div>
    <div class="portal-center">
      <div class="avatar-ring">
        <div class="avatar"></div>
      </div>
      <div class="portal-card">
        <div class="portal-card-head">Login to continue your journey.</div>
        <form id="loginForm" class="portal-form">
          <div class="field">
            <input id="studentName" type="text" placeholder="Enter your Student Name" required />
          </div>
          <div class="field">
            <input id="studentEmail" type="email" placeholder="Enter your University Email or ID" required />
          </div>
          <div class="field">
            <input id="studentPassword" type="password" placeholder="Enter your Password" minlength="6" required />
          </div>
          <div class="form-row">
            <a href="#" class="link muted">Forgot Password</a>
          </div>
          <div class="oauth">
            <button type="button" id="loginGoogle" class="oauth-btn google">
              <img class="icon-img" src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" alt="Google" width="18" height="18" />
              <span>Continue with Google</span>
            </button>
            <button type="button" id="loginApple" class="oauth-btn apple">
              <img class="icon-img" src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" width="18" height="18" />
              <span>Continue with Apple</span>
            </button>
          </div>
          <button type="submit" class="cta primary wide">LOG IN</button>
          <div class="form-row center muted small">
            <span>Don't have an account?</span>
            <a href="#" class="link">Sign Up</a>
          </div>
        </form>
      </div>
    </div>

  </section>

  <script>
    const form = document.getElementById('loginForm');
    const nameEl = document.getElementById('studentName');
    const emailEl = document.getElementById('studentEmail');
    const passEl = document.getElementById('studentPassword');
    const gBtn = document.getElementById('loginGoogle');
    const aBtn = document.getElementById('loginApple');

    gBtn.addEventListener('click', () => {
      alert('Google OAuth will be connected with backend. For now, use the form login.');
    });
    aBtn.addEventListener('click', () => {
      alert('Apple Sign-In will be connected with backend. For now, use the form login.');
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = nameEl.value.trim();
      const email = emailEl.value.trim();
      const pass = passEl.value;
      if (!name || !email || pass.length < 6) {
        alert('Please fill all fields correctly.');
        return;
      }
      localStorage.setItem('userName', name);
      localStorage.setItem('userEmail', email);
      window.location.href = './index.html';
    });
  </script>
</body>
</html>
